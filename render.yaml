services:
  - type: web
    name: savorymind-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: savorymind-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://savorymind.net","https://www.savorymind.net","https://app.savorymind.net"]'
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: "30"

databases:
  - name: savorymind-db
    databaseName: savorymind
    user: savorymind
    plan: free
