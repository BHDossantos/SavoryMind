name: DealFlow tests

on:
  push:
    branches:
      - main
      - "claude/dealflow-**"
    paths:
      - "dealflow/**"
      - ".github/workflows/dealflow-tests.yml"
  pull_request:
    paths:
      - "dealflow/**"
      - ".github/workflows/dealflow-tests.yml"

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dealflow
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dealflow/package-lock.json

      - run: npm ci

      - run: npm test
