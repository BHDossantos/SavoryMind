# Test suite for the Slotly project parked under slotly/.
# Delete this file once slotly/ moves to BHDossantos/Slotly — the migrated
# repo carries its own copy at .github/workflows/test.yml.
name: slotly-tests

on:
  push:
    branches: [main]
    paths: ["slotly/**"]
  pull_request:
    paths: ["slotly/**"]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: slotly/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: slotly/backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest
