name: Deploy Frontend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        working-directory: frontend
        run: |
          gcloud run deploy savorymind-frontend \
            --source . \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --project savorymind \
            --set-env-vars "NEXT_PUBLIC_API_URL=https://api.savorymind.net,NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }},NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }},GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},SOCIAL_LOGIN_SECRET=${{ secrets.SOCIAL_LOGIN_SECRET }}"

      - name: Map savorymind.net to Cloud Run
        run: |
          gcloud run domain-mappings create \
            --service savorymind-frontend \
            --domain savorymind.net \
            --region europe-west1 \
            --project savorymind 2>/dev/null || echo "Domain mapping already exists or domain not yet verified — verify at https://console.cloud.google.com/run/domains?project=savorymind"
          gcloud run domain-mappings create \
            --service savorymind-frontend \
            --domain www.savorymind.net \
            --region europe-west1 \
            --project savorymind 2>/dev/null || echo "www mapping already exists or domain not yet verified"
