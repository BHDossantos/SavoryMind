name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Cloud SQL instance and database exist
        env:
          DB_PASSWORD: ${{ secrets.CLOUD_SQL_PASSWORD }}
        run: |
          PROJECT=savorymind
          REGION=europe-west1
          INSTANCE=savorymind-db
          DB_NAME=savorymind

          if gcloud sql instances describe "$INSTANCE" --project="$PROJECT" >/dev/null 2>&1; then
            echo "Cloud SQL instance '$INSTANCE' exists. Syncing postgres password to secret."
            gcloud sql users set-password postgres \
              --instance="$INSTANCE" \
              --password="$DB_PASSWORD" \
              --project="$PROJECT"
          else
            echo "Creating Cloud SQL instance '$INSTANCE' (first-time setup, ~5-10 minutes)..."
            gcloud sql instances create "$INSTANCE" \
              --database-version=POSTGRES_16 \
              --edition=ENTERPRISE \
              --tier=db-g1-small \
              --region="$REGION" \
              --root-password="$DB_PASSWORD" \
              --storage-size=10GB \
              --storage-type=SSD \
              --backup-start-time=03:00 \
              --project="$PROJECT"
          fi

          echo "Ensuring database '$DB_NAME' exists..."
          gcloud sql databases create "$DB_NAME" \
            --instance="$INSTANCE" \
            --project="$PROJECT" 2>/dev/null || echo "Database '$DB_NAME' already exists."

      - name: Deploy backend to Cloud Run
        working-directory: backend
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SOCIAL_LOGIN_SECRET: ${{ secrets.SOCIAL_LOGIN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PASSWORD: ${{ secrets.CLOUD_SQL_PASSWORD }}
          # Optional — leave the secret unset and the app will simply skip Sentry / email sends.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Spotify OAuth — leave both secrets unset and the /api/oauth/spotify/* endpoints
          # respond with 503 so the UI cleanly shows "not configured".
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          # Fernet key encrypting OAuth tokens at rest. Generate with:
          #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
          # Lifespan refuses to start in prod if this is unset / matches the dev default.
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          # Google OAuth client ID (for native /api/auth/google flow). Leave
          # unset and the endpoint returns 503; mobile/web fall back to
          # email-password / NextAuth bridge respectively.
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          # Apple bundle identifier (audience claim for Sign in with Apple).
          # Must match mobile/app.json's ios.bundleIdentifier exactly. Leave
          # unset and /api/auth/apple returns 503 — mobile falls back to
          # WebBrowser. App Store Review Guideline 4.8 requires this to be
          # set before iOS submission since we offer Google sign-in.
          APPLE_BUNDLE_ID: ${{ secrets.APPLE_BUNDLE_ID }}
          # PostHog product-analytics project key. Leave unset and
          # capture() / identify() across the backend become silent no-ops.
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          # Stripe billing — consumer Premium subscription. Leave these unset
          # and billing stays dormant (checkout endpoints return 503, the
          # paywall page still shows). STRIPE_PRICE_ID is the recurring Price
          # id; STRIPE_WEBHOOK_SECRET signs POST /api/billing/webhook.
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          DB_URL="postgresql://postgres:${DB_PASSWORD}@/savorymind?host=/cloudsql/savorymind:europe-west1:savorymind-db"
          gcloud run deploy savorymind-api \
            --source . \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --add-cloudsql-instances=savorymind:europe-west1:savorymind-db \
            --project savorymind \
            --set-env-vars "^|^SECRET_KEY=${SECRET_KEY}|SOCIAL_LOGIN_SECRET=${SOCIAL_LOGIN_SECRET}|ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}|ACCESS_TOKEN_EXPIRE_MINUTES=30|REFRESH_TOKEN_EXPIRE_DAYS=30|COOKIE_DOMAIN=.savorymind.net|COOKIE_SECURE=true|COOKIE_SAMESITE=lax|DATABASE_URL=${DB_URL}|SENTRY_DSN=${SENTRY_DSN}|SENTRY_ENVIRONMENT=production|RESEND_API_KEY=${RESEND_API_KEY}|RESEND_FROM_EMAIL=noreply@savorymind.net|SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}|SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}|SPOTIFY_REDIRECT_URI=https://api.savorymind.net/api/oauth/spotify/callback|FRONTEND_URL=https://savorymind.net|TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY}|GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}|APPLE_BUNDLE_ID=${APPLE_BUNDLE_ID}|POSTHOG_API_KEY=${POSTHOG_API_KEY}|STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}|STRIPE_PRICE_ID=${STRIPE_PRICE_ID}|STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}"

      - name: Map api.savorymind.net to backend
        run: |
          if gcloud run domain-mappings describe \
              --domain api.savorymind.net \
              --region europe-west1 \
              --project savorymind >/dev/null 2>&1; then
            echo "Domain mapping for api.savorymind.net already exists."
          else
            echo "Creating domain mapping for api.savorymind.net..."
            gcloud run domain-mappings create \
              --service savorymind-api \
              --domain api.savorymind.net \
              --region europe-west1 \
              --project savorymind
          fi
