name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure Cloud SQL instance and database exist
        env:
          DB_PASSWORD: ${{ secrets.CLOUD_SQL_PASSWORD }}
        run: |
          PROJECT=savorymind
          REGION=europe-west1
          INSTANCE=savorymind-db
          DB_NAME=savorymind

          if gcloud sql instances describe "$INSTANCE" --project="$PROJECT" >/dev/null 2>&1; then
            echo "Cloud SQL instance '$INSTANCE' exists. Syncing postgres password to secret."
            gcloud sql users set-password postgres \
              --instance="$INSTANCE" \
              --password="$DB_PASSWORD" \
              --project="$PROJECT"
          else
            echo "Creating Cloud SQL instance '$INSTANCE' (first-time setup, ~5-10 minutes)..."
            gcloud sql instances create "$INSTANCE" \
              --database-version=POSTGRES_16 \
              --edition=ENTERPRISE \
              --tier=db-g1-small \
              --region="$REGION" \
              --root-password="$DB_PASSWORD" \
              --storage-size=10GB \
              --storage-type=SSD \
              --backup-start-time=03:00 \
              --project="$PROJECT"
          fi

          echo "Ensuring database '$DB_NAME' exists..."
          gcloud sql databases create "$DB_NAME" \
            --instance="$INSTANCE" \
            --project="$PROJECT" 2>/dev/null || echo "Database '$DB_NAME' already exists."

      - name: Deploy backend to Cloud Run
        working-directory: backend
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SOCIAL_LOGIN_SECRET: ${{ secrets.SOCIAL_LOGIN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DB_PASSWORD: ${{ secrets.CLOUD_SQL_PASSWORD }}
          # Optional — leave the secret unset and the app will simply skip Sentry / email sends.
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          DB_URL="postgresql://postgres:${DB_PASSWORD}@/savorymind?host=/cloudsql/savorymind:europe-west1:savorymind-db"
          gcloud run deploy savorymind-api \
            --source . \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 1 \
            --min-instances 1 \
            --add-cloudsql-instances=savorymind:europe-west1:savorymind-db \
            --project savorymind \
            --set-env-vars "^|^SECRET_KEY=${SECRET_KEY}|SOCIAL_LOGIN_SECRET=${SOCIAL_LOGIN_SECRET}|ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}|ACCESS_TOKEN_EXPIRE_MINUTES=30|REFRESH_TOKEN_EXPIRE_DAYS=30|COOKIE_DOMAIN=.savorymind.net|COOKIE_SECURE=true|COOKIE_SAMESITE=lax|DATABASE_URL=${DB_URL}|SENTRY_DSN=${SENTRY_DSN}|SENTRY_ENVIRONMENT=production|RESEND_API_KEY=${RESEND_API_KEY}|RESEND_FROM_EMAIL=noreply@savorymind.net"

      - name: Map api.savorymind.net to backend
        run: |
          if gcloud run domain-mappings describe \
              --domain api.savorymind.net \
              --region europe-west1 \
              --project savorymind >/dev/null 2>&1; then
            echo "Domain mapping for api.savorymind.net already exists."
          else
            echo "Creating domain mapping for api.savorymind.net..."
            gcloud run domain-mappings create \
              --service savorymind-api \
              --domain api.savorymind.net \
              --region europe-west1 \
              --project savorymind
          fi
