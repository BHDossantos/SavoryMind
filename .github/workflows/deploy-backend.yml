name: Deploy Backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy backend to Cloud Run
        working-directory: backend
        env:
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          SOCIAL_LOGIN_SECRET: ${{ secrets.SOCIAL_LOGIN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          gcloud run deploy savorymind-api \
            --source . \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --project savorymind \
            --set-env-vars "^|^SECRET_KEY=${SECRET_KEY}|SOCIAL_LOGIN_SECRET=${SOCIAL_LOGIN_SECRET}|ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}|ACCESS_TOKEN_EXPIRE_DAYS=30"

      - name: Map api.savorymind.net to backend
        run: |
          gcloud run domain-mappings create \
            --service savorymind-api \
            --domain api.savorymind.net \
            --region europe-west1 \
            --project savorymind 2>/dev/null || echo "Domain mapping already exists or domain not yet verified"
