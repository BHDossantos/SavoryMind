name: Setup Render Backend (run once)

on:
  workflow_dispatch:

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Provision Render PostgreSQL + Web Service
        uses: actions/github-script@v7
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        with:
          script: |
            const key = process.env.RENDER_API_KEY;
            const headers = {
              Authorization: `Bearer ${key}`,
              'Content-Type': 'application/json',
              Accept: 'application/json',
            };

            async function rFetch(path, opts = {}) {
              const res = await fetch(`https://api.render.com/v1${path}`, { headers, ...opts });
              const text = await res.text();
              try { return { status: res.status, data: JSON.parse(text) }; }
              catch { return { status: res.status, data: text }; }
            }

            // 1. Get owner (user or team) ID
            const owners = await rFetch('/owners?limit=1');
            console.log('Owners:', JSON.stringify(owners.data, null, 2));
            const ownerId = owners.data[0]?.owner?.id;
            if (!ownerId) throw new Error('Could not get owner ID');
            console.log('Owner ID:', ownerId);

            // 2. Create PostgreSQL database
            const db = await rFetch('/postgres', {
              method: 'POST',
              body: JSON.stringify({
                databaseName: 'savorymind',
                databaseUser: 'savorymind',
                enableHighAvailability: false,
                plan: 'free',
                version: '16',
                name: 'savorymind-db',
                ownerId,
              }),
            });
            console.log('Create DB response:', JSON.stringify(db.data, null, 2));

            if (db.status !== 201 && !db.data?.id) {
              // Check if already exists
              const existing = await rFetch('/postgres?limit=20');
              const existingDb = existing.data?.find?.(d => d.name === 'savorymind-db');
              if (existingDb) {
                console.log('DB already exists:', existingDb.id);
                var dbId = existingDb.id;
                var dbInternalUrl = existingDb.connectionInfo?.internalConnectionString;
              } else {
                throw new Error(`Failed to create DB: ${JSON.stringify(db.data)}`);
              }
            } else {
              var dbId = db.data.id;
              var dbInternalUrl = db.data.connectionInfo?.internalConnectionString;
            }

            console.log('DB ID:', dbId);
            // DB URL might not be available immediately; we'll use the fromDatabase pattern
            // For now, proceed and note the DB ID for env var linking

            // 3. Create web service
            const svc = await rFetch('/services', {
              method: 'POST',
              body: JSON.stringify({
                type: 'web_service',
                name: 'savorymind-api',
                ownerId,
                serviceDetails: {
                  env: 'docker',
                  dockerfilePath: './Dockerfile',
                  dockerContext: '.',
                  region: 'oregon',
                  plan: 'free',
                  healthCheckPath: '/health',
                },
                envVars: [
                  { key: 'SECRET_KEY', generateValue: true },
                  {
                    key: 'CORS_ORIGINS',
                    value: '["https://savorymind.net","https://www.savorymind.net","https://app.savorymind.net"]',
                  },
                  { key: 'ACCESS_TOKEN_EXPIRE_DAYS', value: '30' },
                ],
                autoDeploy: 'yes',
                repo: 'https://github.com/BHDossantos/SavoryMind',
                branch: 'main',
                rootDir: 'backend',
              }),
            });
            console.log('Create service response:', JSON.stringify(svc.data, null, 2));

            if (svc.status !== 201) {
              const existingSvc = await rFetch('/services?limit=20');
              const found = existingSvc.data?.find?.(s => s.service?.name === 'savorymind-api');
              if (found) {
                console.log('Service already exists:', found.service.id);
                var svcId = found.service.id;
              } else {
                throw new Error(`Failed to create service: ${JSON.stringify(svc.data)}`);
              }
            } else {
              var svcId = svc.data.service?.id ?? svc.data.id;
            }
            console.log('Service ID:', svcId);

            // 4. Link DB to service via DATABASE_URL env var
            if (dbInternalUrl) {
              const envUpdate = await rFetch(`/services/${svcId}/env-vars`, {
                method: 'PUT',
                body: JSON.stringify([
                  { key: 'DATABASE_URL', value: dbInternalUrl },
                  { key: 'SECRET_KEY', generateValue: true },
                  {
                    key: 'CORS_ORIGINS',
                    value: '["https://savorymind.net","https://www.savorymind.net","https://app.savorymind.net"]',
                  },
                  { key: 'ACCESS_TOKEN_EXPIRE_DAYS', value: '30' },
                ]),
              });
              console.log('Env vars updated:', JSON.stringify(envUpdate.data, null, 2));
            } else {
              console.log('DB internal URL not yet available. Render will link them when DB is ready.');
              console.log(`Manually set DATABASE_URL in Render dashboard for service ${svcId}`);
              console.log(`DB ID for reference: ${dbId}`);
            }

            console.log('\n=== DONE ===');
            console.log(`Service: https://dashboard.render.com/web/${svcId}`);
            console.log(`DB: https://dashboard.render.com/d/${dbId}`);
            console.log('API will be available at: https://savorymind-api.onrender.com');
