name: Deploy Frontend to Vercel

on:
  push:
    branches: [main, claude/app-analysis-debugging-IuRKu]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: team_VjQmqHvzWW8ycKrR18Sq3iRt
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Run from repo root so vercel.json (which sets rootDirectory: frontend) is found correctly.
          # VERCEL_ORG_ID env var sets the team scope; vercel.json already sets NEXT_PUBLIC_API_URL.
          vercel --prod \
            --token="$VERCEL_TOKEN" \
            --yes
