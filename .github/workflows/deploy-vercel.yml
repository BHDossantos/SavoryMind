name: Deploy Frontend to Vercel

on:
  push:
    branches: [main, claude/app-analysis-debugging-IuRKu]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: team_VjQmqHvzWW8ycKrR18Sq3iRt
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set +e
          OUTPUT=$(vercel --prod --yes --token="$VERCEL_TOKEN" 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            BODY=$(printf '{"body":"**Vercel deploy failed (exit %s)**\n```\n%s\n```"}' "$EXIT_CODE" "$OUTPUT")
            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              "https://api.github.com/repos/BHDossantos/SavoryMind/commits/$COMMIT_SHA/comments" > /dev/null
          fi
          exit $EXIT_CODE
