name: Deploy Frontend to Vercel

on:
  push:
    branches: [main, claude/app-analysis-debugging-IuRKu]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: team_VjQmqHvzWW8ycKrR18Sq3iRt
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set +e
          vercel --prod --yes --token="$VERCEL_TOKEN" > /tmp/vercel.log 2>&1
          EXIT_CODE=$?
          cat /tmp/vercel.log
          if [ $EXIT_CODE -ne 0 ]; then
            python3 - <<'PYEOF'
import os, json
from urllib.request import urlopen, Request
log = open("/tmp/vercel.log").read()[:4000]
body = json.dumps({"body": f"**Vercel deploy failed**\n```\n{log}\n```"})
req = Request(
    f"https://api.github.com/repos/BHDossantos/SavoryMind/commits/{os.environ['COMMIT_SHA']}/comments",
    data=body.encode(),
    method="POST",
    headers={
        "Authorization": f"token {os.environ['GITHUB_TOKEN']}",
        "Content-Type": "application/json",
    }
)
urlopen(req)
PYEOF
          fi
          exit $EXIT_CODE
