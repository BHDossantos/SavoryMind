services:
  postgres:
    image: postgres:16-alpine
    container_name: dealflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dealflow
      POSTGRES_PASSWORD: dealflow
      POSTGRES_DB: dealflow
    ports:
      - "5433:5432"
    volumes:
      - dealflow-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dealflow -d dealflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  dealflow-pgdata:
