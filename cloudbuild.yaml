# Google Cloud Build — deploys both backend (Cloud Run) and frontend (Cloud Run)
#
# Required substitutions (set in Cloud Build trigger or gcloud CLI):
#   _REGION             Cloud Run region, e.g. europe-west1
#   _SECRET_KEY         Random 32-char string for JWT signing
#   _SOCIAL_LOGIN_SECRET Shared secret between frontend and backend for social auth
#   _NEXTAUTH_SECRET    Random 32-char string for NextAuth (openssl rand -base64 32)
#   _NEXTAUTH_URL       Public URL of the frontend service (update after first deploy)
#
# Optional substitutions:
#   _CORS_EXTRA         Extra origin to allow, e.g. https://savorymind.net
#
# First-time deploy:
#   1. Run this build with _NEXTAUTH_URL set to a placeholder like https://placeholder.example
#   2. After the build, note the frontend Cloud Run URL from the Console
#   3. Update _NEXTAUTH_URL in the Cloud Build trigger to the real URL
#   4. Run the build again

substitutions:
  _REGION: europe-west1
  _SECRET_KEY: change-me-32chars-in-trigger-settings
  _SOCIAL_LOGIN_SECRET: change-me-in-trigger-settings
  _NEXTAUTH_SECRET: change-me-in-trigger-settings
  _NEXTAUTH_URL: https://placeholder.example
  _CORS_EXTRA: ""

steps:
  # ── Infra: GCS bucket for the SQLite database ───────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: create-bucket
    entrypoint: bash
    args:
      - -c
      - |
        gsutil mb -p $PROJECT_ID -l $_REGION gs://$PROJECT_ID-savorymind-db 2>/dev/null || true

  # ── Backend: build + push ────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build-api
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/savorymind-api
      - .
    waitFor: ["-"]   # start immediately (no deps)

  - name: "gcr.io/cloud-builders/docker"
    id: push-api
    args: ["push", "gcr.io/$PROJECT_ID/savorymind-api"]
    waitFor: ["build-api"]

  # ── Backend: deploy to Cloud Run ─────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-api
    entrypoint: bash
    args:
      - -c
      - |
        CORS="[\"$_NEXTAUTH_URL\""
        [ -n "$_CORS_EXTRA" ] && CORS="$CORS,\"$_CORS_EXTRA\""
        CORS="$CORS]"

        gcloud run deploy savorymind-api \
          --image gcr.io/$PROJECT_ID/savorymind-api \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --min-instances 0 \
          --max-instances 2 \
          --memory 512Mi \
          --cpu 1 \
          --port 8080 \
          --add-volume name=db,type=cloud-storage,bucket=$PROJECT_ID-savorymind-db \
          --add-volume-mount volume=db,mount-path=/data \
          --set-env-vars "DATABASE_URL=sqlite:////data/savorymind.db,SECRET_KEY=$_SECRET_KEY,SOCIAL_LOGIN_SECRET=$_SOCIAL_LOGIN_SECRET,CORS_ORIGINS=$CORS"
    waitFor: ["push-api", "create-bucket"]

  # ── Capture backend URL for frontend build ───────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: get-api-url
    entrypoint: bash
    args:
      - -c
      - |
        URL=$(gcloud run services describe savorymind-api \
          --region $_REGION \
          --format "value(status.url)")
        echo "$URL" > /workspace/api_url.txt
        echo "Backend URL: $URL"
    waitFor: ["deploy-api"]

  # ── Frontend: build + push (bakes NEXT_PUBLIC_API_URL into the bundle) ───────
  - name: "gcr.io/cloud-builders/docker"
    id: build-web
    entrypoint: bash
    args:
      - -c
      - |
        API_URL=$(cat /workspace/api_url.txt)
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=$API_URL \
          -t gcr.io/$PROJECT_ID/savorymind-web \
          ./frontend
    waitFor: ["get-api-url"]

  - name: "gcr.io/cloud-builders/docker"
    id: push-web
    args: ["push", "gcr.io/$PROJECT_ID/savorymind-web"]
    waitFor: ["build-web"]

  # ── Frontend: deploy to Cloud Run ────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy-web
    entrypoint: bash
    args:
      - -c
      - |
        API_URL=$(cat /workspace/api_url.txt)
        gcloud run deploy savorymind-web \
          --image gcr.io/$PROJECT_ID/savorymind-web \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --min-instances 0 \
          --max-instances 2 \
          --memory 512Mi \
          --cpu 1 \
          --port 8080 \
          --set-env-vars "NEXTAUTH_SECRET=$_NEXTAUTH_SECRET,NEXTAUTH_URL=$_NEXTAUTH_URL,SOCIAL_LOGIN_SECRET=$_SOCIAL_LOGIN_SECRET,BACKEND_URL=$API_URL,NEXT_PUBLIC_API_URL=$API_URL"
    waitFor: ["push-web"]

images:
  - gcr.io/$PROJECT_ID/savorymind-api
  - gcr.io/$PROJECT_ID/savorymind-web

timeout: 1200s
