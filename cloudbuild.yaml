steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/savorymind-api', './backend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/savorymind-api']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - savorymind-api
      - --image
      - gcr.io/$PROJECT_ID/savorymind-api
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      - --min-instances
      - '0'
      - --max-instances
      - '2'
      - --memory
      - 512Mi
      - --cpu
      - '1'
      - --port
      - '8080'

images:
  - gcr.io/$PROJECT_ID/savorymind-api
