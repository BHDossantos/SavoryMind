# Backend test suite. This workflow becomes active once slotly/ is migrated
# to its own repo (BHDossantos/Slotly) — GitHub only reads workflows from the
# repo root. While parked inside SavoryMind, the mirror workflow at the
# SavoryMind root (slotly-tests.yml) covers PRs.
name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest
