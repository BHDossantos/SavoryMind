services:
  db:
    image: postgres:16-alpine
    container_name: fitnow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fitnow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitnow}
      POSTGRES_DB: ${POSTGRES_DB:-fitnow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitnow} -d ${POSTGRES_DB:-fitnow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # backend and frontend services will be added once their stacks are scaffolded.
  # backend:
  #   build: ./backend
  #   env_file: .env
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   ports:
  #     - "4000:4000"
  #
  # frontend:
  #   build: ./frontend
  #   env_file: .env
  #   depends_on:
  #     - backend
  #   ports:
  #     - "3000:3000"

volumes:
  postgres-data:
